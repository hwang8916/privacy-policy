<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앱 선택 - 개인정보 처리방침</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .app-card {
            padding: 30px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .app-card:hover {
            border-color: #667eea;
            background: #f0f2ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .app-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .app-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .app-desc {
            font-size: 12px;
            color: #999;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>앱 정책 문서</h1>
            <p class="subtitle">앱을 선택하여 개인정보 처리방침과 이용약관을 확인하세요</p>
        </header>

        <div class="apps-grid">
            <div class="app-card" onclick="goToApp('habbit')">
                <div class="app-icon">🌱</div>
                <div class="app-name">톡톡</div>
                <div class="app-desc">습관·할 일·메모·집중 · 개인정보 처리방침 / 이용약관</div>
            </div>
            <div class="app-card" onclick="goToApp('sobi-kong')">
                <div class="app-icon">💰</div>
                <div class="app-name">소비콩</div>
                <div class="app-desc">개인 금융 관리 · 개인정보 처리방침 / 이용약관</div>
            </div>
        </div>

        <div class="footer">
            <p>더 많은 앱이 추가될 예정입니다</p>
        </div>
    </div>

    <script>
        function goToApp(appName) {
            window.location.href = `${appName}/index.html`;
        }
    </script>
</body>
</html>
