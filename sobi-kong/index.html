<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소비콩 문서 센터</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(160deg, #f3f7ff 0%, #eef2ff 45%, #f9fbff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1d2736;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #dbe4f0;
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 22px 50px rgba(46, 91, 186, 0.14);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: #edf3ff;
      color: #3567d6;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 34px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #5f6d82;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .docs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .doc-card {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 24px 22px;
      border-radius: 18px;
      border: 1px solid #dfe6f2;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .doc-card:hover {
      transform: translateY(-3px);
      border-color: #7ca3f0;
      box-shadow: 0 14px 28px rgba(53, 103, 214, 0.12);
    }

    .doc-icon {
      font-size: 28px;
      margin-bottom: 14px;
    }

    .doc-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .doc-desc {
      font-size: 14px;
      line-height: 1.6;
      color: #66758a;
    }

    .home-link {
      display: inline-block;
      margin-top: 26px;
      color: #3567d6;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Sobi-kong Documents</div>
    <h1>소비콩 문서 센터</h1>
    <p class="subtitle">앱 이용 전 필요한 문서를 선택해 확인할 수 있습니다. 개인정보 처리방침과 이용약관은 각각 한국어, 영어, 일본어 버전을 제공합니다.</p>

    <div class="docs">
      <a class="doc-card" href="privacy-policy.html">
        <div class="doc-icon">🔒</div>
        <div class="doc-title">개인정보 처리방침</div>
        <div class="doc-desc">개인정보 수집 항목, 이용 목적, 보관 기간, 제3자 서비스 이용 내용을 확인합니다.</div>
      </a>

      <a class="doc-card" href="terms-of-service.html">
        <div class="doc-icon">📘</div>
        <div class="doc-title">이용약관</div>
        <div class="doc-desc">서비스 이용 조건, 프리미엄 구독, 책임 제한, 금지행위와 문의처를 확인합니다.</div>
      </a>
    </div>

    <a class="home-link" href="../index.html">메인으로 돌아가기</a>
  </div>
</body>
</html>
